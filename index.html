<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="./scripts.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <div id="display">
        <div id="numbers">
            <div id="firstNumber"><p></p></div>
            <div id="operator"></div>
            <div id="secondNumber"></div>
            <div id="equalsSign"></div>
            <div id="results"></div>
        </div>
    </div>
    <div id="buttons">
        <div id="top-buttons">
            <div id="clear" class="ind-buttons"><button>AC</button></div>
            <div id="backspace" class="ind-buttons"><button>Delete</button></div>
        </div>
        <div id="first-row">
            <div id="one" class="ind-buttons"><button>1</button></div>
            <div id="two" class="ind-buttons"><button>2</button></div>
            <div id="three" class="ind-buttons"><button>3</button></div>
            <div id="add" class="ind-buttons"><button>+</button></div>
        </div>
        <div id="second-row">
            <div id="four" class="ind-buttons"><button>4</button></div>
            <div id="five" class="ind-buttons"><button>5</button></div>
            <div id="six" class="ind-buttons"><button>6</button></div>
            <div id="subtract" class="ind-buttons"><button>-</button></div>
        </div>
        <div id="third-row">
            <div id="seven" class="ind-buttons"><button>7</button></div>
            <div id="eight" class="ind-buttons"><button>8</button></div>            
            <div id="nine" class="ind-buttons"><button>9</button></div> 
            <div id="multiply" class="ind-buttons"><button>x</button></div>     
        </div>
        <div id="fourth-row">
            <div id="zero" class="ind-buttons"><button>0</button></div>
            <!-- <div id="comma" class="ind-buttons"><button>,</button></div>         -->
            <div id="equals" class="ind-buttons"><button>=</button></div>        
            <div id="devide" class="ind-buttons"><button>÷</button></div>  
        </div>
    </div>
</body>
</html>
